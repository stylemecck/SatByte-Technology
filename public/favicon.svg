<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0" />
    </radialGradient>
  </defs>
  {/* Cyan glowing sphere background */}
  <circle cx="90" cy="50" r="10" fill="url(#glow)" />
  
  {/* Main Orbit Ring */}
  <ellipse 
    cx="50" cy="50" rx="45" ry="30" 
    stroke="#0c1b32" stroke-width="4" 
    fill="none" transform="rotate(-15 50 50)" 
  />
  
  {/* The Satellite Sphere */}
  <circle cx="90" cy="50" r="6" fill="#00e5ff" />
  
  {/* Pixel Trail */}
  <rect x="78" y="48" width="5" height="5" fill="#0c1b32" />
  <rect x="72" y="52" width="4" height="4" fill="#00e5ff" opacity="0.7" />
  <rect x="66" y="47" width="3" height="3" fill="#0c1b32" opacity="0.4" />
</svg>